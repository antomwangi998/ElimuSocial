name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Fix project
        run: |
          ROOT=$(find . -name "settings.gradle.kts" | head -1 | xargs dirname)
          cd $ROOT

          # Fix kotlin/sdk versions
          sed -i 's/kotlin = "1.9.22"/kotlin = "2.0.21"/' gradle/libs.versions.toml || true
          sed -i 's/compileSdk = 35/compileSdk = 34/' app/build.gradle.kts || true
          sed -i 's/targetSdk = 35/targetSdk = 34/' app/build.gradle.kts || true

          # Fix theme
          find app/src -name "themes.xml" -exec sed -i 's/parent="android:Theme\.[^"]*"/parent="android:Theme.DeviceDefault.NoActionBar"/g' {} \;

          # Replace all mipmap icon refs with built-in android icon
          sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@android:drawable/sym_def_app_icon"|g' app/src/main/AndroidManifest.xml
          sed -i 's|android:roundIcon="@mipmap/ic_launcher_round"||g' app/src/main/AndroidManifest.xml
          sed -i 's|android:icon="@mipmap/[^"]*"|android:icon="@android:drawable/sym_def_app_icon"|g' app/src/main/AndroidManifest.xml

          echo "=== AndroidManifest.xml ==="
          cat app/src/main/AndroidManifest.xml

      - name: Build Debug APK
        run: |
          ROOT=$(find . -name "settings.gradle.kts" | head -1 | xargs dirname)
          cd $ROOT
          chmod +x gradlew || true
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
