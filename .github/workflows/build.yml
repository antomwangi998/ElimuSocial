name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK components
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Fix versions and theme
        run: |
          ROOT=$(find . -name "settings.gradle.kts" | head -1 | xargs dirname)
          cd $ROOT
          # Fix kotlin version
          sed -i 's/kotlin = "1.9.22"/kotlin = "2.0.21"/' gradle/libs.versions.toml || true
          sed -i 's/agp = "8.3.2"/agp = "8.5.2"/' gradle/libs.versions.toml || true
          # Fix theme
          find app/src -name "themes.xml" -exec sed -i \
            's/parent="android:Theme\.[^"]*"/parent="android:Theme.DeviceDefault.NoActionBar"/g' {} \;

      - name: Build Debug APK
        run: |
          ROOT=$(find . -name "settings.gradle.kts" | head -1 | xargs dirname)
          cd $ROOT
          chmod +x gradlew || true
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ElimuSocial-debug
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
          if-no-files-found: error
