name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Fix versions
        run: |
          ROOT=$(find . -name "settings.gradle.kts" | head -1 | xargs dirname)
          cd $ROOT
          sed -i 's/kotlin = "1.9.22"/kotlin = "2.0.21"/' gradle/libs.versions.toml || true
          sed -i 's/compileSdk = 35/compileSdk = 34/' app/build.gradle.kts || true
          sed -i 's/targetSdk = 35/targetSdk = 34/' app/build.gradle.kts || true

      - name: Fix theme
        run: |
          ROOT=$(find . -name "settings.gradle.kts" | head -1 | xargs dirname)
          cd $ROOT
          printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' '<resources>' '    <style name="Theme.ElimuSocial" parent="android:Theme.Material.Light.NoTitleBar">' '        <item name="android:windowBackground">#0D0D1A</item>' '        <item name="android:statusBarColor">#0D0D1A</item>' '        <item name="android:navigationBarColor">#0D0D1A</item>' '    </style>' '</resources>' > app/src/main/res/values/themes.xml
          cat app/src/main/res/values/themes.xml

      - name: Build Debug APK
        run: |
          ROOT=$(find . -name "settings.gradle.kts" | head -1 | xargs dirname)
          cd $ROOT
          chmod +x gradlew || true
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
